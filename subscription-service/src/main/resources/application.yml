server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: subscription-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/subscription_db}
    username: ${SPRING_DATASOURCE_USERNAME:subsys}
    password: ${SPRING_DATASOURCE_PASSWORD:subsys}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  outbox:
    fixed-delay-ms: 2000
    claim-timeout-ms: 30000
  kafka:
    consumer:
      retry-backoff-ms: 1000
      retry-attempts: 3
  renewal:
    fixed-delay-ms: 15000
